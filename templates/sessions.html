<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost — Чат</title>
<style>
:root {
  --bg:          #0c0e12;
  --surface:     #13161d;
  --surface2:    #181c25;
  --surface3:    #1e2330;
  --border:      #252b3a;
  --border-soft: #1a1f2c;

  --accent:      #5b8dee;
  --accent-dim:  #1a2a50;
  --accent-glow: rgba(91,141,238,0.15);

  --thai:        #e8d5a3;
  --thai-dim:    #9a8f75;
  --ru:          #a8c8ff;
  --ru-dim:      #4a6080;

  --green:       #3ecf8e;
  --yellow:      #f0b429;
  --red:         #e05555;

  --text:        #c5cde0;
  --text-dim:    #525d78;
  --text-muted:  #363d52;

  --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --sidebar: 280px;
  --radius: 10px;
  --radius-sm: 6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); display: flex; flex-direction: column; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Топбар ── */
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 18px; height: 50px;
  border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: .1em; color: var(--accent); }
.logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 7px var(--accent); }
.sep { flex: 1; }
.tb-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; color: var(--text-dim); border: 1px solid var(--border); background: var(--surface2); transition: all .15s; }
.tb-btn:hover { color: var(--text); border-color: var(--accent); }

/* ── Макет ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Сайдбар ── */
.sidebar { width: var(--sidebar); flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
.sb-head { padding: 12px 14px 8px; border-bottom: 1px solid var(--border-soft); flex-shrink: 0; }
.sb-title { font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
.search-box { display: flex; align-items: center; gap: 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 9px; transition: border-color .15s; }
.search-box:focus-within { border-color: var(--accent); }
.search-box svg { color: var(--text-dim); flex-shrink: 0; }
.search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 12px; width: 100%; }
.search-box input::placeholder { color: var(--text-dim); }
.sessions-list { overflow-y: auto; flex: 1; padding: 5px 7px; }
.session-item { padding: 9px 11px; border-radius: var(--radius-sm); cursor: pointer; transition: background .12s; border: 1px solid transparent; margin-bottom: 2px; }
.session-item:hover { background: var(--surface2); }
.session-item.active { background: var(--accent-dim); border-color: var(--accent); }
.si-id { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-item.active .si-id { color: var(--accent); }
.si-meta { display: flex; gap: 8px; align-items: center; }
.badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--surface3); color: var(--text-dim); font-family: var(--mono); }
.badge.done { background: rgba(62,207,142,.12); color: var(--green); }
.badge.partial { background: rgba(240,180,41,.12); color: var(--yellow); }
.si-bar { margin-top: 5px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.si-bar-fill { height: 100%; border-radius: 1px; background: var(--green); transition: width .3s; }
.sessions-empty { text-align: center; padding: 40px 14px; color: var(--text-dim); font-size: 12px; }

/* ── Главная панель ── */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

/* ── Шапка сессии ── */
.chat-head {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.ch-info { flex: 1; min-width: 0; }
.ch-id { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Переключатель тайский / русский */
.lang-toggle {
  display: flex; align-items: center; gap: 0;
  border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0;
}
.lang-toggle button {
  padding: 5px 12px; font-size: 11px; font-weight: 600;
  color: var(--text-dim); background: var(--surface2); transition: all .15s;
  border-right: 1px solid var(--border);
}
.lang-toggle button:last-child { border-right: none; }
.lang-toggle button.active { background: var(--accent-dim); color: var(--accent); }

.btn-copy {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 600;
  background: var(--accent); color: #fff; transition: all .15s; flex-shrink: 0;
}
.btn-copy:hover { background: #7aaaf5; }
.btn-copy.copied { background: var(--green); }

/* ── Фильтр сегментов ── */
.seg-bar {
  display: flex; gap: 3px; padding: 7px 18px 0;
  border-bottom: 1px solid var(--border); background: var(--surface);
  overflow-x: auto; flex-shrink: 0;
}
.seg-bar::-webkit-scrollbar { height: 0; }
.seg-tab {
  padding: 6px 12px; font-size: 10px; font-family: var(--mono); font-weight: 500;
  color: var(--text-dim); border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border: 1px solid transparent; border-bottom: none; position: relative; bottom: -1px;
  white-space: nowrap; transition: all .12s; background: var(--surface);
}
.seg-tab:hover { color: var(--text); background: var(--surface2); }
.seg-tab.active { color: var(--accent); background: var(--bg); border-color: var(--border); border-bottom-color: var(--bg); }
.seg-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 4px; background: var(--text-muted); vertical-align: middle; position: relative; top: -1px; }
.seg-dot.done { background: var(--green); }
.seg-dot.partial { background: var(--yellow); }

/* ── Чат ── */
.chat-scroll { flex: 1; overflow-y: auto; padding: 20px 18px 60px; background: var(--bg); }

/* Временная метка / разделитель */
.time-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 20px 0 10px; opacity: .5;
}
.time-divider::before, .time-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.time-divider span { font-family: var(--mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; }

/* Пузырь */
.bubble-wrap { display: flex; flex-direction: column; margin-bottom: 6px; }
.bubble {
  max-width: 75%; position: relative;
  padding: 10px 14px 8px; border-radius: 16px;
  transition: box-shadow .15s;
  cursor: default;
}
.bubble:hover { box-shadow: 0 2px 16px rgba(0,0,0,.4); }

/* Тайский — слева */
.bubble.thai {
  align-self: flex-start;
  background: var(--surface2);
  border: 1px solid var(--border-soft);
  border-top-left-radius: 4px;
}
.bubble.thai .bubble-lang { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--thai-dim); margin-bottom: 4px; }
.bubble.thai .bubble-text { font-size: 15px; line-height: 1.65; color: var(--thai); }

/* Русский — справа */
.bubble.ru {
  align-self: flex-end;
  background: var(--accent-dim);
  border: 1px solid rgba(91,141,238,.25);
  border-top-right-radius: 4px;
}
.bubble.ru .bubble-lang { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--ru-dim); margin-bottom: 4px; }
.bubble.ru .bubble-text { font-size: 14px; line-height: 1.65; color: var(--ru); }

/* Режим «оба» — двойная карточка */
.bubble.both {
  max-width: 85%;
  align-self: stretch;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  padding: 0; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden;
}
.bubble.both .both-side { padding: 10px 14px 8px; }
.bubble.both .both-side:first-child { border-right: 1px solid var(--border-soft); }
.bubble.both .bubble-lang { font-size: 9px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
.bubble.both .bubble-lang.lth { color: var(--thai-dim); }
.bubble.both .bubble-lang.lru { color: var(--ru-dim); }
.bubble.both .bubble-text.tth { font-size: 15px; line-height: 1.65; color: var(--thai); }
.bubble.both .bubble-text.tru { font-size: 14px; line-height: 1.65; color: var(--ru); }
.bubble.both .bubble-text.empty { color: var(--text-muted); font-style: italic; font-size: 13px; }

.bubble-time { font-family: var(--mono); font-size: 9px; color: var(--text-muted); margin-top: 4px; }
.bubble.thai .bubble-time { text-align: left; }
.bubble.ru  .bubble-time { text-align: right; }
.bubble.both + .bubble-time { text-align: left; display: block; margin-top: 3px; }

/* Редактируемый перевод в режиме «оба» */
.bubble.both .tru-edit {
  background: none; border: none; outline: none;
  color: var(--ru); font-size: 14px; line-height: 1.65; font-family: var(--sans);
  resize: none; width: 100%; min-height: 42px; padding: 0;
}
.bubble.both .tru-edit::placeholder { color: var(--text-muted); font-style: italic; }
.save-status { font-size: 9px; color: var(--text-muted); margin-top: 2px; transition: color .3s; }
.save-status.saving { color: var(--yellow); }
.save-status.saved  { color: var(--green); }
.save-status.error  { color: var(--red); }

/* Пустое состояние */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  color: var(--text-dim); background: var(--bg);
}
.empty-icon { font-size: 44px; opacity: .3; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text); }
.empty-sub { font-size: 12px; }

/* Прогресс */
.progress-bar {
  padding: 8px 18px; background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.pb-label { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
.pb-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.pb-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width .4s; }
.pb-pct { font-family: var(--mono); font-size: 11px; color: var(--green); min-width: 34px; text-align: right; flex-shrink: 0; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-radius: var(--radius-sm);
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 12px; color: var(--text); z-index: 500;
  transform: translateY(60px); opacity: 0; transition: all .22s;
  box-shadow: 0 6px 20px rgba(0,0,0,.5);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.green { border-color: var(--green); color: var(--green); }
.toast.red   { border-color: var(--red); color: var(--red); }

/* Loading */
.loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  z-index: 1000; font-family: var(--mono); font-size: 13px; color: var(--text-dim);
}
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) { :root { --sidebar: 200px; } }
@media (max-width: 520px) { .sidebar { display: none; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="logo"><div class="logo-dot"></div>GHOST</div>
  <span style="font-size:12px;color:var(--text-dim)">Чат</span>
  <div class="sep"></div>
  <button class="tb-btn" onclick="location.href='/'">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 8 8 12 12 16"/><line x1="16" y1="12" x2="8" y2="12"/></svg>
    Запись
  </button>
  <button class="tb-btn" onclick="location.href='/batch'">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    Пакетный перевод
  </button>
  <button class="tb-btn" onclick="refreshAll()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Обновить
  </button>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-title">Сессии</div>
      <div class="search-box">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Поиск..." id="search-input" oninput="filterSessions(this.value)">
      </div>
    </div>
    <div class="sessions-list" id="sessions-list">
      <div class="sessions-empty">Загрузка...</div>
    </div>
  </aside>

  <div class="main" id="main">

    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Выберите сессию</div>
      <div class="empty-sub">Список слева</div>
    </div>

    <div id="session-view" style="display:none;flex-direction:column;height:100%;overflow:hidden;flex:1;">

      <div class="chat-head">
        <div class="ch-info">
          <div class="ch-id" id="ch-id">—</div>
          <div class="ch-meta" id="ch-meta">—</div>
        </div>
        <!-- Переключатель отображения -->
        <div class="lang-toggle" id="lang-toggle">
          <button onclick="setMode('thai')" id="btn-thai">ไทย</button>
          <button onclick="setMode('both')" id="btn-both" class="active">Оба</button>
          <button onclick="setMode('ru')" id="btn-ru">РУС</button>
        </div>
        <button class="btn-copy" id="btn-copy" onclick="copyAll()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Копировать
        </button>
      </div>

      <div class="seg-bar" id="seg-bar"></div>
      <div class="chat-scroll" id="chat-scroll"></div>

      <div class="progress-bar">
        <span class="pb-label">Перевод:</span>
        <div class="pb-track"><div class="pb-fill" id="pb-fill" style="width:0%"></div></div>
        <span class="pb-pct" id="pb-pct">0%</span>
      </div>

    </div>

  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading" id="loading"><div class="spinner"></div>Загрузка...</div>

<script>
let allSessions = [];
let currentSession = null;
let currentSegIdx = 0;
let displayMode = 'both'; // 'thai' | 'ru' | 'both'
let debounceTimers = {};
const DEBOUNCE_MS = 700;

function fmtTime(sec) {
  const s = Math.floor(sec), m = Math.floor(s/60), ss = String(s%60).padStart(2,'0');
  return `${m}:${ss}`;
}
function fmtDate(ts) {
  return new Date(ts*1000).toLocaleString('ru',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

async function refreshAll() {
  try {
    const r = await fetch('/api/sessions');
    if (!r.ok) throw new Error('HTTP '+r.status);
    allSessions = await r.json();
    renderSidebar(allSessions);
    if (currentSession) {
      const found = allSessions.find(s => s.id === currentSession.id);
      if (found) await loadSession(currentSession.id);
    }
  } catch(e) {
    toast('Ошибка: '+e.message,'red');
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

async function loadSession(id) {
  try {
    const r = await fetch('/api/sessions/'+id);
    if (!r.ok) throw new Error('HTTP '+r.status);
    currentSession = await r.json();
    currentSegIdx = 0;
    renderSession();
  } catch(e) {
    toast('Ошибка загрузки: '+e.message,'red');
  }
}

function renderSidebar(sessions) {
  const list = document.getElementById('sessions-list');
  if (!sessions.length) {
    list.innerHTML = '<div class="sessions-empty">Нет записей</div>';
    return;
  }
  list.innerHTML = sessions.map(s => {
    const pct = s.utterance_count > 0 ? Math.round(s.translated_count/s.utterance_count*100) : 0;
    const bc = pct===100?'done':pct>0?'partial':'';
    const bt = pct===100?'✓ готово':pct>0?`${pct}%`:`${s.utterance_count} реп.`;
    const active = currentSession && currentSession.id===s.id ? ' active' : '';
    return `<div class="session-item${active}" onclick="selectSession(${s.id})">
      <div class="si-id">${esc(s.slug)}</div>
      <div class="si-meta">
        <span class="badge">${s.segment_count} сег.</span>
        <span class="badge ${bc}">${bt}</span>
      </div>
      <div class="si-bar"><div class="si-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function filterSessions(q) {
  renderSidebar(allSessions.filter(s => s.slug.toLowerCase().includes(q.toLowerCase())));
}
function selectSession(id) { loadSession(id); }

function setMode(mode) {
  displayMode = mode;
  ['thai','both','ru'].forEach(m => {
    document.getElementById('btn-'+m).classList.toggle('active', m===mode);
  });
  renderChat();
}

function renderSession() {
  if (!currentSession) return;
  const s = currentSession;
  document.getElementById('empty-state').style.display = 'none';
  const view = document.getElementById('session-view');
  view.style.display = 'flex';

  document.getElementById('ch-id').textContent = s.slug;
  const totalU = s.segments.reduce((a,seg)=>a+seg.utterances.length,0);
  const doneU  = s.segments.reduce((a,seg)=>a+seg.utterances.filter(u=>u.text_ru).length,0);
  document.getElementById('ch-meta').textContent =
    `${s.segments.length} сег. · ${totalU} реплик · ${fmtDate(s.created_at)}`;

  updateProgress(doneU, totalU);
  renderSegBar();
  renderChat();
  renderSidebar(allSessions);
}

function updateProgress(done, total) {
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('pb-fill').style.width = pct+'%';
  document.getElementById('pb-pct').textContent = pct+'%';
}

function renderSegBar() {
  const s = currentSession;
  const bar = document.getElementById('seg-bar');
  bar.innerHTML = '<button class="seg-tab'+(currentSegIdx===-1?' active':'')+'" onclick="switchSeg(-1)">Все</button>' +
    s.segments.map((seg,i) => {
      const tot = seg.utterances.length, done = seg.utterances.filter(u=>u.text_ru).length;
      const dc = done===tot&&tot>0?'done':done>0?'partial':'';
      return `<button class="seg-tab${i===currentSegIdx?' active':''}" onclick="switchSeg(${i})">
        <span class="seg-dot ${dc}"></span>SEG ${String(seg.index).padStart(4,'0')}
      </button>`;
    }).join('');
}

function switchSeg(idx) {
  currentSegIdx = idx;
  renderSegBar();
  renderChat();
  document.getElementById('chat-scroll').scrollTop = 0;
}

function renderChat() {
  const s = currentSession;
  if (!s) return;

  const segs = currentSegIdx === -1 ? s.segments : [s.segments[currentSegIdx]].filter(Boolean);
  const scroll = document.getElementById('chat-scroll');

  if (!segs.length || segs.every(seg => !seg.utterances.length)) {
    scroll.innerHTML = `<div style="text-align:center;padding:60px 0;color:var(--text-dim);font-size:13px">Нет реплик</div>`;
    return;
  }

  let html = '';
  for (const seg of segs) {
    if (!seg.utterances.length) continue;

    // Разделитель сегмента
    html += `<div class="time-divider"><span>SEG ${String(seg.index).padStart(4,'0')}</span></div>`;

    let prevMin = -1;
    for (const u of seg.utterances) {
      const min = Math.floor(u.start_sec / 60);

      // Временная метка каждые 5 минут
      if (min !== prevMin && min % 5 === 0 && prevMin !== -1) {
        html += `<div class="time-divider"><span>${fmtTime(u.start_sec)}</span></div>`;
      }
      prevMin = min;

      html += renderBubble(u);
    }
  }

  scroll.innerHTML = html;

  // Textarea handlers
  scroll.querySelectorAll('textarea[data-uid]').forEach(ta => {
    autoResize(ta);
    ta.addEventListener('input', () => { autoResize(ta); onEdit(Number(ta.dataset.uid), ta); });
  });
}

function renderBubble(u) {
  const t = fmtTime(u.start_sec);
  const hasRu = !!u.text_ru;

  if (displayMode === 'thai') {
    return `<div class="bubble-wrap">
      <div class="bubble thai">
        <div class="bubble-lang">ไทย · ${t}</div>
        <div class="bubble-text">${esc(u.text_thai)}</div>
      </div>
    </div>`;
  }

  if (displayMode === 'ru') {
    if (!hasRu) return '';
    return `<div class="bubble-wrap">
      <div class="bubble ru">
        <div class="bubble-lang">РУС · ${t}</div>
        <div class="bubble-text">${esc(u.text_ru)}</div>
      </div>
    </div>`;
  }

  // Оба — двухколонная карточка
  const ruContent = hasRu
    ? `<textarea class="tru-edit" data-uid="${u.id}" rows="2" placeholder="Введите перевод...">${esc(u.text_ru)}</textarea>`
    : `<textarea class="tru-edit" data-uid="${u.id}" rows="2" placeholder="Введите перевод..."></textarea>`;

  return `<div class="bubble-wrap">
    <div class="bubble both" id="card-${u.id}">
      <div class="both-side">
        <div class="bubble-lang lth">ไทย</div>
        <div class="bubble-text tth">${esc(u.text_thai)}</div>
      </div>
      <div class="both-side">
        <div class="bubble-lang lru">РУС</div>
        ${ruContent}
        <div class="save-status" id="ss-${u.id}"></div>
      </div>
    </div>
    <span style="font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-top:3px;display:block">${t}</span>
  </div>`;
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function onEdit(uttId, ta) {
  const ss = document.getElementById('ss-'+uttId);
  if (ss) { ss.textContent = 'изменено...'; ss.className = 'save-status'; }
  clearTimeout(debounceTimers[uttId]);
  debounceTimers[uttId] = setTimeout(() => saveTranslation(uttId, ta.value, ss), DEBOUNCE_MS);
}

async function saveTranslation(uttId, value, ss) {
  if (ss) { ss.textContent = 'сохранение...'; ss.className = 'save-status saving'; }
  try {
    const r = await fetch('/api/utterances/'+uttId+'/translation', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text_ru: value.trim()||null}),
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    if (ss) {
      ss.textContent = 'сохранено'; ss.className = 'save-status saved';
      setTimeout(() => { if(ss){ss.textContent='';ss.className='save-status';} }, 2000);
    }
    updateLocal(uttId, value.trim()||null);
    const card = document.getElementById('card-'+uttId);
    if (card) card.classList.toggle('translated', !!value.trim());
    recalc();
  } catch(e) {
    if (ss) { ss.textContent='ошибка!'; ss.className='save-status error'; }
    toast('Ошибка: '+e.message,'red');
  }
}

function updateLocal(uttId, val) {
  if (!currentSession) return;
  for (const seg of currentSession.segments) {
    const u = seg.utterances.find(u=>u.id===uttId);
    if (u) { u.text_ru = val; break; }
  }
}

function recalc() {
  if (!currentSession) return;
  let total=0, done=0;
  for (const seg of currentSession.segments) {
    total += seg.utterances.length;
    done  += seg.utterances.filter(u=>u.text_ru).length;
  }
  updateProgress(done, total);
}

async function copyAll() {
  if (!currentSession) return;
  const lines = [];
  for (const seg of currentSession.segments) {
    for (const u of seg.utterances) {
      lines.push(`[${fmtTime(u.start_sec)}] ${u.text_thai}`);
      if (u.text_ru) lines.push(`         → ${u.text_ru}`);
    }
  }
  const btn = document.getElementById('btn-copy');
  try {
    await navigator.clipboard.writeText(lines.join('\n'));
    btn.classList.add('copied');
    toast('Скопировано!','green');
    setTimeout(()=>btn.classList.remove('copied'),2000);
  } catch(e) {
    toast('Не удалось скопировать','red');
  }
}

refreshAll();
setInterval(() => { if (!currentSession) refreshAll(); }, 20000);
</script>
</body>
</html>
