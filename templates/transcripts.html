<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Аудио Транскрипты</title>
<style>
  :root {
    --bg: #0d0f14; --surface: #151820; --border: #1e2330;
    --accent: #4f8ef7; --text: #c8d0e0; --text-dim: #5a6480;
    --green: #3ecf8e; --mono: 'JetBrains Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); margin: 0; padding-bottom: 50px; }
  
  /* Плеер прилипает к верху */
  .player-sticky { position: sticky; top: 0; background: var(--surface); padding: 20px; border-bottom: 1px solid var(--border); z-index: 100; text-align: center; }
  #mainPlayer { width: 100%; max-width: 800px; }

  .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }

  /* Сетка транскрипции */
  .segment-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px 0; border-bottom: 1px solid var(--border); }
  .seg-meta { font-size: 10px; color: var(--text-dim); margin-bottom: 5px; }
  
  .orig-text { cursor: pointer; line-height: 1.6; font-size: 14px; }
  .orig-text:hover { color: var(--accent); }
  
  textarea { 
    width: 100%; height: 80px; background: var(--surface); border: 1px solid var(--border); 
    color: var(--green); padding: 10px; border-radius: 4px; font-family: var(--mono);
    resize: vertical;
  }
</style>
</head>
<body>

<div class="player-sticky">
    <audio controls id="mainPlayer"></audio>
    <div id="file-info" style="font-size: 12px; margin-top: 10px; color: var(--text-dim);">Выберите сессию для начала</div>
</div>

<div class="container" id="root">
    </div>

<script>
const player = document.getElementById('mainPlayer');

// Функция смены аудио и рендера транскрипции
function loadSession(session) {
    const root = document.getElementById('root');
    root.innerHTML = '';
    
    // В прототипе берем первый доступный файл как основной для плеера
    if (session.segments.length > 0) {
        player.src = session.segments[0].filename;
    }

    session.segments.forEach(seg => {
        const row = document.createElement('div');
        row.className = 'segment-row';
        row.innerHTML = `
            <div>
                <div class="seg-meta">${seg.filename}</div>
                <div class="orig-text" onclick="seek(${seg.index})">${seg.text || '...'}</div>
            </div>
            <div>
                <div class="seg-meta">Перевод (сохраняется автоматически)</div>
                <textarea placeholder="Введите перевод..." onblur="saveTranslation('${seg.filename}', this.value)"></textarea>
            </div>
        `;
        root.appendChild(row);
    });
}

function seek(index) {
    // Здесь нужна логика сопоставления индекса сегмента с таймкодом
    player.play();
}

function saveTranslation(filename, text) {
    console.log("Сохраняем перевод для", filename, ":", text);
    // TODO: fetch('/api/save-translation', { method: 'POST', ... })
}

// Загрузка списка сессий
fetch('/api/transcripts')
    .then(r => r.json())
    .then(data => {
        if(data.length > 0) loadSession(data[0]);
    });
</script>
</body>
</html>
